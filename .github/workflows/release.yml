name: release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to build and release (e.g. v1.14.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: arm
            goarm: 7

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: resolve version
        id: ver
        run: echo "name=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          CGO_ENABLED: 0
          VERSION: ${{ steps.ver.outputs.name }}
        run: |
          SUFFIX="${GOOS}-${GOARCH}"
          [ -n "${GOARM}" ] && SUFFIX="${SUFFIX}v${GOARM}"
          LDFLAGS="-s -w -X main.Version=${VERSION} -X main.Commit=$(git rev-parse --short HEAD) -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          go build -ldflags "${LDFLAGS}" -o "quiccochet-${SUFFIX}" ./cmd/quiccochet/

      - uses: actions/upload-artifact@v7
        with:
          name: quiccochet-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goarm && format('v{0}', matrix.goarm) || '' }}
          path: quiccochet-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true

      - name: checksums
        run: sha256sum quiccochet-* > checksums.txt

      - name: create release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.tag || github.ref_name }}
        run: |
          gh release create "${VERSION}" \
            --repo "${{ github.repository }}" \
            --generate-notes \
            quiccochet-* checksums.txt
